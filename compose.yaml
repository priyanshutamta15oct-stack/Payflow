services:
    nginx:
        image: nginx:latest
        container_name: payflow_nginx
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - backend

    backend:
        build: ./Backend
        container_name: payflow_backend
        ports:
            - "8000:8000"
        volumes:
            - ./Backend:/app
        env_file:
            - ./Backend/.env
        depends_on:
            - postgres

    postgres:
        image: postgres:17
        container_name: payflow_postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: Priyansh123
            POSTGRES_DB: Payflow
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: payflow_redis
        ports:
            - "6379:6379"

volumes:
    postgres_data:

